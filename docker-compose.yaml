# Reads variables from a root .env file automatically.
# Copy env.example → .env and fill in the values before running.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trustlayer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trustlayer}
      POSTGRES_DB: ${POSTGRES_DB:-trustlayer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trustlayer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://trustlayer:trustlayer@postgres:5432/trustlayer}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_API_URL: ${NEXT_PUBLIC_BACKEND_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_MONAD_CHAIN_ID: ${NEXT_PUBLIC_MONAD_CHAIN_ID:-10143}
        NEXT_PUBLIC_MONAD_NFT_CONTRACT: ${NEXT_PUBLIC_MONAD_NFT_CONTRACT:-}
        NEXT_PUBLIC_MONAD_REWARD_CONTRACT: ${NEXT_PUBLIC_MONAD_REWARD_CONTRACT:-}
        NEXT_PUBLIC_MONAD_CCOP_CONTRACT: ${NEXT_PUBLIC_MONAD_CCOP_CONTRACT:-}
        NEXT_PUBLIC_LOCAL_NFT_CONTRACT: ${NEXT_PUBLIC_LOCAL_NFT_CONTRACT:-}
        NEXT_PUBLIC_LOCAL_REWARD_CONTRACT: ${NEXT_PUBLIC_LOCAL_REWARD_CONTRACT:-}
        NEXT_PUBLIC_LOCAL_CCOP_CONTRACT: ${NEXT_PUBLIC_LOCAL_CCOP_CONTRACT:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  contracts:
    build: ./contracts
    environment:
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      MONAD_TESTNET_RPC: ${MONAD_TESTNET_RPC:-https://testnet-rpc.monad.xyz}
      MONAD_MAINNET_RPC: ${MONAD_MAINNET_RPC:-https://rpc.monad.xyz}
      MONAD_API_KEY: ${MONAD_API_KEY:-}
    ports:
      - "8545:8545"

volumes:
  postgres_data:
